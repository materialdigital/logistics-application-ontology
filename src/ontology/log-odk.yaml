id: log
title: "My Application Ontology"
github_org: materialdigital
git_main_branch: main
repo: logistics-application-ontology
uribase: https://w3id.org/pmd
uribase_suffix: log

namespaces:
  - https://w3id.org/pmd/log/

release_artefacts:
  - base
  - full
  - simple
primary_release: full
export_formats:
  - owl
  - ttl
remove_owl_nothing: true

ci: []

import_group:
  products:
    - id: pmdco
      module_type: slme
      mirror_from: https://w3id.org/pmd/co/3.0.0
      base_iris:
        - https://w3id.org/pmd/co/
    - id: org
      module_type: slme
      mirror_from: https://www.w3.org/ns/org
      base_iris:
        - http://www.w3.org/ns/org#
    - id: foaf
      module_type: custom
      mirror_from: http://xmlns.com/foaf/0.1/index.rdf
      base_iris:
        - http://xmlns.com/foaf/0.1/